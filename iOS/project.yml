name: BathTime
options:
  bundleIdPrefix: com.shimondeitel.babybath
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BathTime:
    type: application
    platform: iOS
    sources:
      - path: BathTime
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babybath
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BathTime/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BathTimeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BathTimeTests
      - path: BathTime.storekit
    dependencies:
      - target: BathTime
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babybath.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BathTimeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BathTimeUITests
    dependencies:
      - target: BathTime
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babybath.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BathTime:
    build:
      targets:
        BathTime: all
        BathTimeTests: [test]
        BathTimeUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BathTime.storekit
    test:
      config: Debug
      storeKitConfiguration: BathTime.storekit
      targets:
        - BathTimeTests
        - BathTimeUITests
    archive:
      config: Release
